<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台 - Nav</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>">
  <script type="module" src="./js/admin.js"></script>
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo">⚙️ 管理后台</a>
      <div class="header-actions">
        <button class="theme-toggle" title="切换主题">🌙</button>
        <a href="/" class="btn btn-ghost btn-sm">返回主页</a>
        <button id="logout-btn" class="btn btn-ghost btn-sm" style="display:none">退出</button>
      </div>
    </div>
  </header>

  <main class="container" style="padding-top: 24px; padding-bottom: 48px;">
    <!-- Login -->
    <section id="login-section" style="max-width: 360px; margin: 80px auto;">
      <h2 style="margin-bottom: 16px; text-align: center;">管理员登录</h2>
      <form id="login-form" style="display: flex; flex-direction: column; gap: 12px;">
        <input type="password" id="login-password" placeholder="输入管理密码" required>
        <button type="submit" class="btn btn-primary" style="width: 100%;">登录</button>
        <p id="login-error" style="color: var(--color-danger); font-size: 13px; text-align: center; display: none;"></p>
      </form>
    </section>

    <!-- Admin Panel -->
    <section id="admin-section" style="display: none;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h2>导航管理</h2>
        <div style="display: flex; gap: 8px;">
          <button class="btn btn-primary" id="btn-add-link">+ 添加链接</button>
          <button class="btn btn-ghost" id="btn-add-category">+ 添加分类</button>
        </div>
      </div>

      <!-- Link Form (hidden by default) -->
      <div id="link-form-panel" style="display: none; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 20px; margin-bottom: 24px;">
        <h3 id="link-form-title" style="margin-bottom: 16px;">添加链接</h3>
        <form id="link-form" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
          <input type="hidden" id="link-id">
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">标题 *</label>
            <input type="text" id="link-title" placeholder="网站名称" required>
          </div>
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">URL *</label>
            <input type="url" id="link-url" placeholder="https://example.com" required>
          </div>
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">描述</label>
            <input type="text" id="link-desc" placeholder="简短描述">
          </div>
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">分类 *</label>
            <select id="link-category" required></select>
          </div>
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">图标 URL（留空自动获取）</label>
            <input type="url" id="link-favicon" placeholder="自动获取">
          </div>
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">排序</label>
            <input type="number" id="link-sort" placeholder="0" value="0">
          </div>
          <div style="grid-column: 1 / -1; display: flex; gap: 8px; justify-content: flex-end;">
            <button type="button" class="btn btn-ghost" id="link-cancel">取消</button>
            <button type="submit" class="btn btn-primary">保存</button>
          </div>
        </form>
      </div>

      <!-- Category Form (hidden by default) -->
      <div id="category-form-panel" style="display: none; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 20px; margin-bottom: 24px;">
        <h3 id="category-form-title" style="margin-bottom: 16px;">添加分类</h3>
        <form id="category-form" style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 12px; align-items: end;">
          <input type="hidden" id="cat-id">
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">名称 *</label>
            <input type="text" id="cat-name" placeholder="分类名称" required>
          </div>
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">图标（emoji）</label>
            <input type="text" id="cat-icon" placeholder="🌐">
          </div>
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">Slug *</label>
            <input type="text" id="cat-slug" placeholder="category-slug" required>
          </div>
          <div>
            <label style="font-size: 13px; color: var(--color-muted); margin-bottom: 4px; display: block;">排序</label>
            <input type="number" id="cat-sort" placeholder="0" value="0">
          </div>
          <div style="display: flex; gap: 8px;">
            <button type="button" class="btn btn-ghost" id="cat-cancel">取消</button>
            <button type="submit" class="btn btn-primary">保存</button>
          </div>
        </form>
      </div>

      <!-- GitHub Topics -->
      <div id="topics-panel" style="background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 20px; margin-bottom: 24px;">
        <div class="empty-state">加载中...</div>
      </div>

      <!-- Data Table -->
      <div id="admin-content">
        <div class="empty-state">加载中...</div>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div id="modal-overlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;padding:20px;">
    <div style="background:var(--color-surface);border-radius:16px;padding:24px;width:100%;max-width:480px;box-shadow:0 8px 24px rgba(0,0,0,0.12);max-height:90vh;overflow-y:auto;">
      <h3 id="modal-title" style="margin-bottom:16px;font-size:18px;"></h3>
      <div id="modal-body"></div>
    </div>
  </div>
</body>
</html>
